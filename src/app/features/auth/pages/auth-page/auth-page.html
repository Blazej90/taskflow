<div class="auth">
  <h1>Sign in</h1>
  <p class="subtitle">Continue with Google or email</p>

  <button class="btn-google" (click)="onGoogle()" [disabled]="auth.loading()">
    Continue with Google
  </button>

  <div class="divider">or</div>

  <div class="field">
    <label for="email">Email</label>
    <input
      id="email"
      type="email"
      [value]="email()"
      (input)="email.set($any($event.target).value)"
      placeholder="you@example.com"
      autocomplete="email"
      [disabled]="auth.loading()"
    />
  </div>

  <button class="btn-primary" (click)="onSendLink()" [disabled]="auth.loading()">Send link</button>

  <p class="hint" *ngIf="auth.loading()">Working…</p>
  <p class="error" *ngIf="auth.error()">{{ auth.error() }}</p>
</div>
