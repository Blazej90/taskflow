<div class="page">
  <header class="header">
    <h1>{{ isEdit ? 'Edit task' : 'New task' }}</h1>
    <a routerLink="/tasks">← Back to list</a>
  </header>

  <p class="loading" *ngIf="loading()">
    <span>Saving...</span>
  </p>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="field">
      <span>Title</span>
      <input type="text" formControlName="title" [disabled]="loading()" />

      <small *ngIf="form.get('title')?.touched && form.get('title')?.invalid">
        Title is required (min 2 chars)
      </small>
    </label>

    <label class="field">
      <span class="optional">Description</span>
      <textarea
        rows="3"
        formControlName="description"
        [disabled]="loading()"
        placeholder="Add description (optional)..."
      ></textarea>
    </label>

    <div class="field">
      <span>Priority</span>
      <div class="priority-options">
        <label class="priority-option low">
          <input type="radio" formControlName="priority" value="low" [disabled]="loading()" />
          <span class="priority-badge">!</span>
          <span>Low</span>
        </label>

        <label class="priority-option medium">
          <input type="radio" formControlName="priority" value="medium" [disabled]="loading()" />
          <span class="priority-badge">!!</span>
          <span>Medium</span>
        </label>

        <label class="priority-option high">
          <input type="radio" formControlName="priority" value="high" [disabled]="loading()" />
          <span class="priority-badge">!!!</span>
          <span>High</span>
        </label>
      </div>
    </div>

    <label class="field">
      <span>Status</span>
      <select formControlName="status" [disabled]="loading()">
        <option value="todo">todo</option>
        <option value="doing">doing</option>
        <option value="done">done</option>
      </select>
    </label>

    <label class="field">
      <span class="optional">Due date</span>
      <input 
        type="date" 
        formControlName="dueDate" 
        [disabled]="loading()"
        [min]="minDate"
        placeholder="YYYY-MM-DD"
      />
    </label>

    <button type="submit" [disabled]="form.invalid || loading()">
      {{ loading() ? 'Saving...' : isEdit ? 'Save changes' : 'Create task' }}
    </button>
  </form>
</div>
