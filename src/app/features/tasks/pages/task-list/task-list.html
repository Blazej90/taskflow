<div class="topbar">
  <div class="user">
    <span *ngIf="auth.user() as u"
      >Signed in as <b>{{ u.email }}</b></span
    >
    <span *ngIf="!auth.user()">Not signed in</span>
  </div>

  <button class="btn logout-btn" (click)="logout()" [disabled]="auth.loading() || !auth.user()">
    <span>Logout</span>
    <svg
      width="16"
      height="16"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
      <polyline points="16 17 21 12 16 7"></polyline>
      <line x1="21" y1="12" x2="9" y2="12"></line>
    </svg>
  </button>
</div>

<header class="header" *ngIf="!selectMode(); else selectionToolbar">
  <h1>Tasks</h1>

  <div class="header-actions">
    <div class="segmented">
      <button
        type="button"
        class="segmented-btn"
        [class.active]="viewMode() === 'list'"
        (click)="setViewMode('list')"
        [disabled]="loading()"
      >
        List
      </button>
      <button
        type="button"
        class="segmented-btn"
        [class.active]="viewMode() === 'board'"
        (click)="setViewMode('board')"
        [disabled]="loading()"
      >
        Board
      </button>
    </div>

    <button class="btn ghost" type="button" (click)="toggleSelectMode()" [disabled]="loading()">
      Select
    </button>

    <a
      class="btn"
      routerLink="/tasks/new"
      [class.disabled]="loading()"
      [attr.aria-disabled]="loading()"
    >
      + New task
    </a>
  </div>
</header>

<ng-template #selectionToolbar>
  <header class="selection-toolbar">
    <div class="left">
      <button
        class="icon-btn"
        type="button"
        (click)="toggleSelectMode()"
        aria-label="Cancel selection"
      >
        ✕
      </button>

      <span class="selection-pill">
        <strong>{{ selectedCount() }}</strong> selected
      </span>
    </div>

    <div class="right">
      <button
        class="action-btn"
        type="button"
        (click)="bulkMarkDone()"
        [disabled]="selectedCount() === 0"
        title="Mark selected as done"
      >
        ✓ Done
      </button>

      <button
        class="action-btn danger"
        type="button"
        (click)="bulkDelete()"
        [disabled]="selectedCount() === 0"
        title="Delete selected"
      >
        🗑 Delete
      </button>
    </div>
  </header>
</ng-template>

<div class="filters">
  <button
    type="button"
    class="chip"
    [class.active]="statusFilter() === 'all'"
    [disabled]="loading()"
    (click)="setFilter('all')"
    [attr.data-count]="totalCount()"
  >
    All
  </button>
  <button
    type="button"
    class="chip"
    [class.active]="statusFilter() === 'todo'"
    [disabled]="loading()"
    (click)="setFilter('todo')"
    [attr.data-count]="todoCount()"
  >
    Todo
  </button>
  <button
    type="button"
    class="chip"
    [class.active]="statusFilter() === 'doing'"
    [disabled]="loading()"
    (click)="setFilter('doing')"
    [attr.data-count]="doingCount()"
  >
    Doing
  </button>
  <button
    type="button"
    class="chip"
    [class.active]="statusFilter() === 'done'"
    [disabled]="loading()"
    (click)="setFilter('done')"
    [attr.data-count]="doneCount()"
  >
    Done
  </button>
</div>

<div class="search-row">
  <div class="search-field">
    <label>Search</label>
    <div class="input-wrapper">
      <svg
        class="search-icon"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input
        type="text"
        placeholder="Search tasks by title..."
        [disabled]="loading()"
        [ngModel]="searchTerm()"
        (ngModelChange)="searchTerm.set($event)"
      />
    </div>
  </div>

  <div class="sort-field">
    <label>Sort</label>
    <div class="select-wrapper">
      <select [ngModel]="sortBy()" (ngModelChange)="sortBy.set($event)">
        <option value="manual">Manual (drag)</option>
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="status">Status</option>
      </select>
      <svg
        class="select-arrow"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>
  </div>
</div>

<div class="view-switch">
  <button
    class="btn ghost"
    type="button"
    (click)="viewMode.set('list')"
    [class.active]="viewMode() === 'list'"
  >
    List
  </button>

  <button
    class="btn ghost"
    type="button"
    (click)="viewMode.set('board')"
    [class.active]="viewMode() === 'board'"
  >
    Board
  </button>
</div>
<p *ngIf="!isManualOrder()" class="hint">
  Reordering is available only in <strong>Oldest first</strong> mode.
</p>
<section
  *ngIf="viewMode() === 'list'; else boardView"
  class="list"
  cdkDropList
  [cdkDropListDisabled]="!isManualOrder()"
  (cdkDropListDropped)="onDrop($event)"
>
  <div
    *ngFor="let t of filteredTasks(); let i = index"
    class="draggable-row"
    cdkDrag
    [cdkDragDisabled]="!isManualOrder()"
    [cdkDragStartDelay]="{ touch: 180, mouse: 0 }"
  >
    <app-task-card
      [task]="t"
      [selectable]="selectMode()"
      [selected]="isSelected(t.id)"
      (selectedChange)="onSelectedChange($event)"
      (remove)="removeTask($event)"
      (toggle)="toggleTaskStatus($event)"
    ></app-task-card>
  </div>
</section>
<ng-template #boardView>
  <div class="board">
    <div class="col">
      <div class="col-title">Todo</div>

      <div
        class="col-list"
        cdkDropList
        [cdkDropListData]="boardTodo()"
        [cdkDropListConnectedTo]="['doingList', 'doneList']"
        (cdkDropListDropped)="onBoardDrop('todo', $event)"
        id="todoList"
      >
        <div
          *ngFor="let t of boardTodo()"
          cdkDrag
          class="draggable-row"
          [cdkDragStartDelay]="{ touch: 180, mouse: 0 }"
        >
          <app-task-card
            [task]="t"
            [selectable]="selectMode()"
            [selected]="isSelected(t.id)"
            (selectedChange)="onSelectedChange($event)"
            (remove)="removeTask($event)"
            (toggle)="toggleTaskStatus($event)"
          ></app-task-card>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="col-title">Doing</div>

      <div
        class="col-list"
        cdkDropList
        [cdkDropListData]="boardDoing()"
        [cdkDropListConnectedTo]="['todoList', 'doneList']"
        (cdkDropListDropped)="onBoardDrop('doing', $event)"
        id="doingList"
      >
        <div
          *ngFor="let t of boardDoing()"
          cdkDrag
          class="draggable-row"
          [cdkDragStartDelay]="{ touch: 180, mouse: 0 }"
        >
          <app-task-card
            [task]="t"
            [selectable]="selectMode()"
            [selected]="isSelected(t.id)"
            (selectedChange)="onSelectedChange($event)"
            (remove)="removeTask($event)"
            (toggle)="toggleTaskStatus($event)"
          ></app-task-card>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="col-title">Done</div>

      <div
        class="col-list"
        cdkDropList
        [cdkDropListData]="boardDone()"
        [cdkDropListConnectedTo]="['todoList', 'doingList']"
        (cdkDropListDropped)="onBoardDrop('done', $event)"
        id="doneList"
      >
        <div
          *ngFor="let t of boardDone()"
          cdkDrag
          class="draggable-row"
          [cdkDragStartDelay]="{ touch: 180, mouse: 0 }"
        >
          <app-task-card
            [task]="t"
            [selectable]="selectMode()"
            [selected]="isSelected(t.id)"
            (selectedChange)="onSelectedChange($event)"
            (remove)="removeTask($event)"
            (toggle)="toggleTaskStatus($event)"
          ></app-task-card>
        </div>
      </div>
    </div>
  </div>
</ng-template>
<div *ngIf="isEmpty()" class="empty">
  <h3>No tasks here 👀</h3>
  <p>Create a new task or change the filter.</p>
  <a class="btn" routerLink="/tasks/new"> New task</a>
</div>
