<article class="card" 
  [class.selected]="selected" 
  [class.highlight]="highlight" 
  [class.overdue]="overdue"
  [class.completing]="isCompleting()">
  <div *ngIf="selectable" class="select-checkbox" (click)="$event.stopPropagation()">
    <input
      type="checkbox"
      [checked]="selected"
      (change)="onToggleSelected($any($event.target).checked)"
    />
  </div>

  <div class="top">
    <div class="title-with-priority">
      <div
        class="priority-indicator"
        [class]="'priority-' + task.priority"
        [class.pulsing]="task.priority === 'high'"
      >
        <span class="priority-dot"></span>
      </div>
      <h3>{{ task.title }}</h3>
    </div>

    <div class="actions">
      <a
        class="btn icon-only"
        [routerLink]="['/tasks', task.id, 'edit']"
        [class.disabled]="isBusy"
        (click)="$event.stopPropagation()"
        title="Edit"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
      </a>

      <button
        class="btn icon-only status-btn"
        [class.next-todo]="task.status === 'done'"
        [class.next-doing]="task.status === 'todo'"
        [class.next-done]="task.status === 'doing'"
        type="button"
        (click)="$event.stopPropagation(); onComplete()"
        [disabled]="isBusy || isCompleting()"
        title="Next status"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>

      <button
        class="btn icon-only danger"
        type="button"
        (click)="$event.stopPropagation(); remove.emit(task.id)"
        [disabled]="isBusy"
        title="Delete"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="3 6 5 6 21 6"></polyline>
          <path
            d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
          ></path>
        </svg>
      </button>
    </div>
  </div>

  <p *ngIf="task.description">{{ task.description }}</p>

  <div class="footer">
    <span class="badge" [ngClass]="'badge-' + task.status">
      {{ task.status }}
    </span>
    
    @if (task.dueDate; as due) {
      <div class="due-info">
        <span class="due-date">{{ due | dateFormat }}</span>
        @if (daysRemaining(); as countdown) {
          <span class="countdown" [class.urgent]="countdown.urgent" [class.overdue]="countdown.overdue">
            @if (countdown.days === 0) {
              {{ countdown.label }}
            } @else {
              {{ countdown.days }} {{ countdown.label }}
            }
          </span>
        }
      </div>
    }
  </div>
</article>
